<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH Retro Quiz</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .landing {
      max-width: 440px;
      width: 100%;
    }

    .landing-hero {
      text-align: center;
      padding: 40px 32px 32px;
      background: white;
      border-radius: var(--ah-radius-lg) var(--ah-radius-lg) 0 0;
      border-bottom: 1px solid var(--ah-border);
    }

    .ah-logo-large {
      width: 72px;
      height: 72px;
      background: var(--ah-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
      margin: 0 auto 20px;
    }

    .landing-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--ah-text);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .landing-sub {
      font-size: 15px;
      color: var(--ah-text-light);
      line-height: 1.55;
    }

    .landing-links {
      background: white;
      border-radius: 0 0 var(--ah-radius-lg) var(--ah-radius-lg);
      overflow: hidden;
      box-shadow: var(--ah-shadow);
    }

    .landing-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--ah-text);
      border-top: 1px solid var(--ah-border);
      transition: background 0.12s;
    }

    .landing-link:hover { background: var(--ah-bg); }
    .landing-link:hover .link-title { color: var(--ah-blue); }

    .link-icon-wrap {
      width: 48px;
      height: 48px;
      background: var(--ah-blue-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .link-body { flex: 1; }

    .link-title {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 2px;
      transition: color 0.12s;
    }

    .link-desc {
      display: block;
      font-size: 13px;
      color: var(--ah-text-light);
      font-weight: 500;
    }

    .link-arrow {
      font-size: 18px;
      color: var(--ah-text-light);
    }
  </style>
</head>
<body>

<div class="landing fade-in">
  <div class="landing-hero">
    <div class="ah-logo-large">AH</div>
    <h1 class="landing-title">Sprint Retro Quiz</h1>
    <p class="landing-sub">Stem anoniem en ontdek wie welke kwaliteit in huis heeft.</p>
  </div>

  <div class="landing-links">
    <a href="/host.html" class="landing-link">
      <div class="link-icon-wrap">📺</div>
      <div class="link-body">
        <span class="link-title">Host scherm</span>
        <span class="link-desc">Op het grote scherm – bedien de quiz</span>
      </div>
      <span class="link-arrow">›</span>
    </a>
    <a href="/vote.html" class="landing-link">
      <div class="link-icon-wrap">📱</div>
      <div class="link-body">
        <span class="link-title">Stemmen</span>
        <span class="link-desc">Open op je telefoon en breng je stem uit</span>
      </div>
      <span class="link-arrow">›</span>
    </a>
  </div>
</div>

</body>
</html>
