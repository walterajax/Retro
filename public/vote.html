<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AH Retro Quiz – Stem</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .vote-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 32px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* Waiting state */
    #waiting-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .waiting-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .waiting-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--ah-blue);
      margin-bottom: 10px;
    }

    .waiting-sub {
      font-size: 16px;
      color: var(--ah-text-light);
      line-height: 1.5;
    }

    /* Question area */
    .question-area {
      margin-bottom: 20px;
    }

    .question-card-mobile {
      background: white;
      border-radius: var(--ah-radius-lg);
      padding: 24px 20px;
      box-shadow: var(--ah-shadow);
      text-align: center;
      margin-bottom: 8px;
    }

    .q-emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    .q-counter {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ah-blue);
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--ah-text);
    }

    /* Voting grid */
    .vote-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .vote-btn {
      background: white;
      border: 2px solid var(--ah-border);
      border-radius: var(--ah-radius);
      padding: 20px 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--ah-text);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 80px;
      box-shadow: var(--ah-shadow);
      -webkit-tap-highlight-color: transparent;
    }

    .vote-btn:active {
      transform: scale(0.96);
    }

    .vote-btn:hover {
      border-color: var(--ah-blue);
      background: var(--ah-blue-light);
      color: var(--ah-blue);
    }

    .vote-btn.selected {
      background: var(--ah-blue);
      border-color: var(--ah-blue);
      color: white;
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(0, 99, 211, 0.35);
    }

    .vote-btn:disabled {
      cursor: not-allowed;
    }

    .vote-btn.not-selected {
      opacity: 0.45;
    }

    .member-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: var(--ah-blue-light);
      color: var(--ah-blue);
      transition: all 0.15s;
    }

    .vote-btn.selected .member-avatar {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    /* Confirmation overlay */
    #voted-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .voted-icon {
      font-size: 72px;
      margin-bottom: 20px;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .voted-title {
      font-size: 26px;
      font-weight: 900;
      color: var(--ah-blue);
      margin-bottom: 10px;
    }

    .voted-for {
      font-size: 18px;
      color: var(--ah-text-light);
      margin-bottom: 8px;
    }

    .voted-name {
      display: inline-block;
      background: var(--ah-blue);
      color: white;
      padding: 6px 20px;
      border-radius: 100px;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .voted-wait {
      font-size: 14px;
      color: var(--ah-text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Revealed state */
    #revealed-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .revealed-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .revealed-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--ah-blue);
      margin-bottom: 8px;
    }

    .revealed-sub {
      font-size: 15px;
      color: var(--ah-text-light);
    }

    /* Finished */
    #finished-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .progress-bar-mini {
      height: 4px;
      border-radius: 100px;
      background: var(--ah-border);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill-mini {
      height: 100%;
      background: var(--ah-blue);
      border-radius: 100px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>

<header class="ah-header">
  <div class="ah-logo">AH</div>
  <div class="ah-header-title">Retro Quiz</div>
  <div class="ah-header-sub" id="header-sub" style="margin-left:auto">Stemmen</div>
  <a href="/" style="color:white; font-size:13px; font-weight:600; text-decoration:none; opacity:0.8; margin-left:16px;">← Terug</a>
</header>

<div class="vote-layout">

  <!-- Waiting for host to start -->
  <div id="waiting-view">
    <div class="waiting-icon">⏳</div>
    <div class="waiting-title">Even geduld...</div>
    <div class="waiting-sub">De host start de quiz zo.<br>Je kunt dan stemmen!</div>
  </div>

  <!-- Active question (voting) -->
  <div id="voting-view" class="hidden">
    <div class="progress-bar-mini">
      <div class="progress-fill-mini" id="mobile-progress" style="width:0%"></div>
    </div>

    <div class="question-area">
      <div class="question-card-mobile">
        <span class="q-emoji" id="m-emoji">💡</span>
        <div class="q-counter" id="m-counter">Vraag 1</div>
        <div class="q-text" id="m-question">Laden...</div>
      </div>
    </div>

    <div class="vote-grid" id="vote-grid"></div>
  </div>

  <!-- Voted confirmation -->
  <div id="voted-view" class="hidden">
    <div class="voted-icon">✅</div>
    <div class="voted-title">Stem uitgebracht!</div>
    <div class="voted-for">Jij stemde op:</div>
    <div class="voted-name" id="voted-for-name"></div>
    <div class="voted-wait">
      <div class="live-dot" style="display:inline-block"></div>
      Wachten op de uitslag...
    </div>
  </div>

  <!-- Revealed -->
  <div id="revealed-view" class="hidden">
    <div class="revealed-icon">🎯</div>
    <div class="revealed-title">Uitslag bekend!</div>
    <div class="revealed-sub">Kijk op het grote scherm<br>voor de resultaten.</div>
  </div>

  <!-- Finished -->
  <div id="finished-view" class="hidden">
    <div style="font-size: 64px; margin-bottom: 20px;">🎊</div>
    <div style="font-size: 24px; font-weight: 900; color: var(--ah-blue); margin-bottom: 10px;">Klaar!</div>
    <div style="font-size: 16px; color: var(--ah-text-light);">De retro is afgerond.<br>Dankjewel voor je deelname!</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io({ transports: ['websocket', 'polling'] });

  // Generate/retrieve voter ID
  let voterId = localStorage.getItem('retro-voter-id');
  if (!voterId) {
    voterId = 'voter-' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('retro-voter-id', voterId);
  }

  let myVote = null;
  let lastQuestion = null;

  const MEMBER_INITIALS = {
    'Myrthe': 'My',
    'Melanie': 'Me',
    'Joëlle': 'Jo',
    'Maarten': 'Ma',
    'Walter': 'Wa',
    'Lara': 'La',
  };

  socket.on('state', (state) => {
    renderMobileState(state);
  });

  function renderMobileState(state) {
    // Hide all views
    ['waiting-view', 'voting-view', 'voted-view', 'revealed-view', 'finished-view']
      .forEach(id => document.getElementById(id).classList.add('hidden'));

    document.getElementById('header-sub').textContent =
      state.phase !== 'waiting' ? `Vraag ${state.currentQuestion + 1}/${state.totalQuestions}` : 'Stemmen';

    if (state.phase === 'waiting') {
      document.getElementById('waiting-view').classList.remove('hidden');
      myVote = null;
      lastQuestion = null;
      return;
    }

    // New question — reset vote
    if (state.currentQuestion !== lastQuestion) {
      myVote = null;
      lastQuestion = state.currentQuestion;
    }

    if (state.phase === 'finished') {
      document.getElementById('finished-view').classList.remove('hidden');
      return;
    }

    // Update question display
    document.getElementById('m-emoji').textContent = state.question.emoji;
    document.getElementById('m-counter').textContent = `Vraag ${state.currentQuestion + 1} van ${state.totalQuestions}`;
    document.getElementById('m-question').textContent = state.question.text;

    const progress = ((state.currentQuestion) / state.totalQuestions) * 100;
    document.getElementById('mobile-progress').style.width = progress + '%';

    if (state.phase === 'voting') {
      if (myVote) {
        // Already voted this question — show confirmation
        document.getElementById('voted-for-name').textContent = myVote;
        document.getElementById('voted-view').classList.remove('hidden');
      } else {
        document.getElementById('voting-view').classList.remove('hidden');
        renderVoteGrid(state.teamMembers);
      }
    } else if (state.phase === 'revealed') {
      document.getElementById('revealed-view').classList.remove('hidden');
    }
  }

  function renderVoteGrid(members) {
    const grid = document.getElementById('vote-grid');
    grid.innerHTML = members.map(name => `
      <button class="vote-btn" onclick="castVote('${name}')" id="btn-${name}">
        <div class="member-avatar">${MEMBER_INITIALS[name] || name.slice(0,2)}</div>
        ${name}
      </button>
    `).join('');
  }

  function castVote(memberName) {
    if (myVote) return; // Already voted

    socket.emit('vote', { voterId, memberName });

    myVote = memberName;

    // Visual feedback
    document.querySelectorAll('.vote-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.id === `btn-${memberName}`) {
        btn.classList.add('selected');
      } else {
        btn.classList.add('not-selected');
      }
    });

    // Show confirmation after brief animation
    setTimeout(() => {
      document.getElementById('voted-for-name').textContent = memberName;
      ['waiting-view', 'voting-view', 'revealed-view', 'finished-view']
        .forEach(id => document.getElementById(id).classList.add('hidden'));
      document.getElementById('voted-view').classList.remove('hidden');
    }, 400);
  }
</script>

</body>
</html>
